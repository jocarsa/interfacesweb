<!doctype html>
<html lang="es">
  <head>
    <title>Turnos de exposición proyecto intermodular</title>
    <meta charset="UTF-8">
    <style>
  :root{
    --fondo:#f5f7fb;
    --panel:#ffffff;
    --panel-suave:#eef2f8;
    --borde:#d7deea;
    --borde-fuerte:#c3cede;
    --texto:#1f2937;
    --texto-suave:#6b7280;
    --primario:#2563eb;
    --primario-oscuro:#1d4ed8;
    --exito:#10b981;
    --sombra:0 10px 30px rgba(15, 23, 42, 0.08);
    --radio:18px;
  }

  *{
    box-sizing:border-box;
  }

  html,body{
    margin:0;
    padding:0;
    font-family:ubuntu,sans-serif;
    background:
      radial-gradient(circle at top left, rgba(37,99,235,0.08), transparent 30%),
      radial-gradient(circle at bottom right, rgba(16,185,129,0.08), transparent 25%),
      var(--fondo);
    color:var(--texto);
  }

  body{
    max-width:1400px;
    margin:auto;
    padding:40px 24px 60px 24px;
  }

  header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:36px;
    padding:22px 28px;
    background:rgba(255,255,255,0.75);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.7);
    border-radius:24px;
    box-shadow:var(--sombra);
  }

  h1{
    margin:0;
    font-size:32px;
    font-weight:700;
    letter-spacing:-0.03em;
  }

  button{
    border:none;
    border-radius:12px;
    padding:12px 18px;
    background:linear-gradient(135deg,var(--primario),var(--primario-oscuro));
    color:white;
    font-weight:600;
    font-size:14px;
    cursor:pointer;
    box-shadow:0 8px 18px rgba(37,99,235,0.22);
    transition:transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
  }

  button:hover{
    transform:translateY(-1px);
    box-shadow:0 12px 24px rgba(37,99,235,0.28);
  }

  button:active{
    transform:translateY(0);
  }

  main{
    display:flex;
    flex-direction:column;
    gap:30px;
  }

  h3{
    margin:0 0 14px 4px;
    font-size:18px;
    font-weight:700;
    color:var(--texto);
  }

  .semana{
    display:grid;
    grid-template-columns:repeat(7, minmax(140px, 1fr));
    gap:16px;
    width:100%;
    min-height:340px;
    margin-bottom:10px;
  }

  .dia{
    background:var(--panel);
    border:1px solid var(--borde);
    border-radius:var(--radio);
    padding:14px;
    font-size:13px;
    box-shadow:var(--sombra);
    display:flex;
    flex-direction:column;
    gap:10px;
    position:relative;
    overflow:hidden;
    transition:transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
  }

  .dia:hover{
    transform:translateY(-3px);
    box-shadow:0 14px 32px rgba(15, 23, 42, 0.12);
    border-color:var(--borde-fuerte);
  }

  .dia::before{
    content:"";
    display:block;
    width:100%;
    height:38px;
    margin:-14px -14px 4px -14px;
    padding:0 14px;
    background:linear-gradient(135deg,#eef4ff,#f8fbff);
    border-bottom:1px solid var(--borde);
    line-height:38px;
    font-size:12px;
    font-weight:700;
    text-transform:capitalize;
    color:var(--texto);
  }

  .dia{
    text-transform:capitalize;
    font-weight:700;
    color:transparent;
  }

  .dia > *{
    color:var(--texto);
  }

  .desactivado{
    opacity:0.55;
    background:linear-gradient(180deg,#fbfcfe,#f2f5fa);
    filter:saturate(0.75);
  }

  .desactivado::before{
    background:linear-gradient(135deg,#f3f4f6,#f9fafb);
    color:var(--texto-suave);
  }

  .turno{
    display:flex;
    align-items:center;
    gap:8px;
    background:var(--panel-suave);
    border:1px solid #e3e8f1;
    border-radius:12px;
    padding:6px 8px;
    font-size:11px;
    font-weight:500;
    color:var(--texto-suave);
    transition:background 0.15s ease, border-color 0.15s ease, transform 0.15s ease;
  }

  .turno:hover{
    background:#e9f0ff;
    border-color:#bfd3ff;
    transform:scale(1.015);
  }

  .slot{
    background:linear-gradient(135deg,var(--primario),#3b82f6);
    border:none;
    border-radius:9px;
    width:100%;
    color:white;
    text-align:center;
    padding:7px 8px;
    font-size:13px;
    font-weight:700;
    box-shadow:0 4px 10px rgba(37,99,235,0.2);
    transition:background 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
  }

  .slot:hover{
    transform:scale(1.03);
    box-shadow:0 8px 16px rgba(37,99,235,0.28);
    background:linear-gradient(135deg,var(--primario-oscuro),var(--primario));
  }

  footer{
    height:20px;
  }

  @media (max-width:1200px){
    .semana{
      grid-template-columns:repeat(4, minmax(140px, 1fr));
    }
  }

  @media (max-width:800px){
    body{
      padding:20px 14px 40px 14px;
    }

    header{
      flex-direction:column;
      align-items:flex-start;
      gap:16px;
    }

    .semana{
      grid-template-columns:repeat(2, minmax(140px, 1fr));
    }
  }

  @media (max-width:520px){
    .semana{
      grid-template-columns:1fr;
    }

    h1{
      font-size:26px;
    }
  }
</style>
  </head>
  <body>
    <header>
      <h1>Turnos de exposición</h1>
      <button>Iniciar sesion</button>
    </header>
    <main>
      <h3>Semana del 11 al 17 de mayo</h3>
      <section class="semana" id="semana1">
        <!-- Javascript rellena -->
      </section>
      <h3>Semana del 1 al 7 de junio</h3>
      <section class="semana" id="semana2">
        <!-- Javascript rellena -->
      </section>
    </main>
    <footer>
    </footer>
    <script>
      // Primero cojo VARIOS elementos
      let tiempo_turno = 25;
      let dias_de_la_semana = ['lunes','martes','miércoles','jueves','viernes','sábado','domingo']
      let semanas = document.querySelectorAll(".semana");
      semanas.forEach(function(semana){
      	for(let dia = 1;dia<=7;dia++){
        	let dia_articulo = document.createElement("article")
          dia_articulo.classList.add("dia")
          if(dia != 2 && dia != 3){dia_articulo.classList.add("desactivado")}
          semana.appendChild(dia_articulo)
          dia_articulo.textContent = dias_de_la_semana[dia-1]
          for(minutos = 0;minutos<60*6;minutos+=tiempo_turno){
          	let elemento = document.createElement("div")
            elemento.classList.add("turno")
            elemento.textContent = minutos;
            dia_articulo.appendChild(elemento)
						let slot = document.createElement("div")
            slot.classList.add("slot")
            slot.textContent = "+"
            elemento.appendChild(slot)
          }
        }
      })
    </script>
    
  </body>
</html>
