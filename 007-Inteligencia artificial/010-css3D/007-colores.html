<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Colores aleatorios</title>

<style>

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    font-family:Arial,sans-serif;
    background:#f0f0f0;
    padding:20px;
}

header,
main,
section,
article,
footer{
    padding:20px;
    margin:15px 0;
    border-radius:12px;
    color:white;
    font-weight:bold;
}

h1,h3{
    margin-bottom:10px;
}

</style>
</head>

<body>

<header>
    <h1>Titulo</h1>
</header>

<main>
    <section>

        <article>
            <h3>Titulo</h3>
            <p>Texto</p>
        </article>

        <article>
            <h3>Titulo</h3>
            <p>Texto</p>
        </article>

        <article>
            <h3>Titulo</h3>
            <p>Texto</p>
        </article>

    </section>
</main>

<footer>
    Footer
</footer>

<script>

function colorAleatorio(){
    return `
        rgb(
            ${Math.floor(Math.random()*256)},
            ${Math.floor(Math.random()*256)},
            ${Math.floor(Math.random()*256)}
        )
    `;
}

document.querySelectorAll("*").forEach(elemento=>{

    if(
        ["HEADER","MAIN","SECTION","ARTICLE","FOOTER"].includes(elemento.tagName)
    ){
        elemento.style.background=colorAleatorio();
    }

});

</script>

</body>
</html>
