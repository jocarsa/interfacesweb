<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Z-Index</title>

<style>

*{
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#eceff1;
    padding:20px;
}

header,
main,
section,
article,
footer{
    position:relative;
    margin:20px;
    padding:20px;
    border-radius:14px;
    color:white;
    font-weight:bold;
}

/* z-index distintos */

header{
    background:#e74c3c;
    z-index:1;
}

main{
    background:#3498db;
    z-index:2;
}

section{
    background:#2ecc71;
    z-index:3;
}

article:nth-child(1){
    background:#9b59b6;
    z-index:4;
}

article:nth-child(2){
    background:#f39c12;
    z-index:5;
}

article:nth-child(3){
    background:#1abc9c;
    z-index:6;
}

footer{
    background:#34495e;
    z-index:7;
}

.zinfo{
    position:absolute;
    top:10px;
    right:10px;

    background:rgba(0,0,0,0.3);

    padding:6px 10px;
    border-radius:8px;

    font-size:12px;
    font-family:monospace;
}

</style>
</head>

<body>

<header>
    <h1>Titulo</h1>
</header>

<main>
    <section>

        <article>
            <h3>Titulo</h3>
            <p>Texto</p>
        </article>

        <article>
            <h3>Titulo</h3>
            <p>Texto</p>
        </article>

        <article>
            <h3>Titulo</h3>
            <p>Texto</p>
        </article>

    </section>
</main>

<footer>
    Footer
</footer>

<script>

document.querySelectorAll("header,main,section,article,footer")
.forEach(elemento=>{

    const z = getComputedStyle(elemento).zIndex;

    const etiqueta = document.createElement("div");
    etiqueta.className = "zinfo";
    etiqueta.textContent = "z-index: " + z;

    elemento.appendChild(etiqueta);

});

</script>

</body>
</html>
