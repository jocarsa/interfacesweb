<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Parallax CSS3D con z-index</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    min-height:100vh;
    overflow:hidden;

    font-family:Arial,sans-serif;

    background:
        radial-gradient(circle at top,#ffffff,#dfe6ee);

    perspective:1200px;
}

/* ESCENA 3D */

#escena{
    width:100vw;
    height:100vh;

    padding:40px;

    transform-style:preserve-3d;

    transition:transform 0.08s linear;

    transform:
        translateZ(-350px)
        scale(0.78);
}

/* ELEMENTOS */

header,
main,
section,
article,
footer{

    position:relative;

    margin:20px;
    padding:24px;

    border-radius:18px;

    color:white;

    box-shadow:
        0 20px 40px rgba(0,0,0,0.18);

    border:1px solid rgba(255,255,255,0.25);

    backdrop-filter:blur(10px);

    transform-style:preserve-3d;

    transition:
        transform 0.2s;
}

/* COLORES Y Z-INDEX */

header{
    background:#e74c3c;
    z-index:1;
}

main{
    background:#3498db;
    z-index:2;
}

section{
    background:#2ecc71;
    z-index:3;
}

article:nth-child(1){
    background:#9b59b6;
    z-index:4;
}

article:nth-child(2){
    background:#f39c12;
    z-index:5;
}

article:nth-child(3){
    background:#1abc9c;
    z-index:6;
}

footer{
    background:#34495e;
    z-index:7;
}

h1,h3{
    margin-top:0;
}

/* ETIQUETA Z */

.zinfo{

    position:absolute;

    top:10px;
    right:10px;

    background:rgba(0,0,0,0.35);

    padding:6px 10px;

    border-radius:8px;

    font-size:12px;

    font-family:monospace;
}

</style>
</head>

<body>

<div id="escena">

    <header>
        <h1>Titulo</h1>
    </header>

    <main>

        <section>

            <article>
                <h3>Titulo</h3>
                <p>
                    Texto de ejemplo para probar profundidad.
                </p>
            </article>

            <article>
                <h3>Titulo</h3>
                <p>
                    Otro bloque con distinto z-index.
                </p>
            </article>

            <article>
                <h3>Titulo</h3>
                <p>
                    El efecto parallax depende de la profundidad.
                </p>
            </article>

        </section>

    </main>

    <footer>
        Footer
    </footer>

</div>

<script>

const escena = document.getElementById("escena");

const elementos = document.querySelectorAll(
    "header, main, section, article, footer"
);

/* PROFUNDIDAD BASADA EN z-index */

elementos.forEach(elemento=>{

    const zIndex =
        parseInt(getComputedStyle(elemento).zIndex) || 0;

    const profundidad = zIndex * 35;

    elemento.style.transform =
        `translateZ(${profundidad}px)`;

    const etiqueta = document.createElement("div");

    etiqueta.className = "zinfo";

    etiqueta.textContent =
        `z-index: ${zIndex} | Z: ${profundidad}px`;

    elemento.appendChild(etiqueta);

});

/* PARALLAX CON RATON */

document.addEventListener("mousemove",e=>{

    const x =
        e.clientX / window.innerWidth - 0.5;

    const y =
        e.clientY / window.innerHeight - 0.5;

    const rotY = x * 10;
    const rotX = -y * 10;

    escena.style.transform = `
        translateZ(-350px)
        scale(0.78)
        rotateX(${rotX}deg)
        rotateY(${rotY}deg)
    `;
});

</script>

</body>
</html>
